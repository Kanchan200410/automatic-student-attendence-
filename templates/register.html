<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Student — AI Attendance</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>
<body>

<header>
  AI Attendance System
  <span class="header-sub">STUDENT REGISTRATION</span>
</header>

<div class="page-wrap">

  <div class="section-heading">Register New Student</div>

  <div class="glass-panel form-box">
    <form method="POST" enctype="multipart/form-data" id="registerForm">

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Arjun Sharma" required>
      </div>

      <div class="form-group">
        <label for="roll">Roll Number</label>
        <input type="text" id="roll" name="roll" placeholder="e.g. 2024CS042" required>
      </div>

      <div class="form-group">
        <label for="image">Face Image</label>
        <input type="file" id="image" name="image" accept="image/*" required>
      </div>

      <div style="margin-top: 28px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap;">
        <button type="submit" class="btn">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
          Register Student
        </button>
        <a href="/" class="back-link">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Back to Dashboard
        </a>
      </div>

    </form>
  </div>

</div>

<script>
  document.getElementById("registerForm").addEventListener("submit", function() {
    const btn = this.querySelector('button[type="submit"]');
    btn.textContent = "Registering...";
    btn.style.opacity = "0.7";
    btn.disabled = true;
  });
</script>
</body>
</html>
